<body class="antialiased text-on-surface font-body-md flex items-center justify-center min-h-screen p-margin">

<!-- Header Section -->

<path class="stroke-white fill-none draw-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" id="check-mark" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>

</div>
<!-- Body Section -->
<div class="p-margin space-y-stack-md">
<!-- 2-Column Summary Grid -->
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-stack-xs">

</div>
<div class="space-y-stack-xs">
<div>

</div>
<div>

<!-- Script for Animations -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('success-modal');
            const checkCircle = document.getElementById('check-circle');
            const checkMark = document.getElementById('check-mark');
            const confettiAnchor = document.getElementById('confetti-anchor');
            const countdownEl = document.getElementById('countdown');

            // Timeline for Entrance
            const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

            tl.to(modal, {
                opacity: 1,
                scale: 1,
                y: 0,
                duration: 0.8,
                onStart: () => createConfetti()
            })
            .to(modal, {
                scale: 1.02,
                duration: 0.2,
                repeat: 1,
                yoyo: true
            }, "-=0.4")
            .to(checkCircle, {
                strokeDashoffset: 0,
                duration: 0.6
            }, "-=0.6")
            .to(checkMark, {
                strokeDashoffset: 0,
                duration: 0.4
            }, "-=0.2");

            // Confetti Generation
            function createConfetti() {
                const colors = ['#ffffff', '#c0c1ff', '#2fd9f4', '#571bc1'];
                for (let i = 0; i < 40; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'confetti-dot';
                    dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confettiAnchor.appendChild(dot);

                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 50 + Math.random() * 150;
                    const x = Math.cos(angle) * velocity;
                    const y = Math.sin(angle) * velocity;

                    gsap.fromTo(dot, 
                        { x: 0, y: 0, scale: 0, opacity: 1 },
                        { 
                            x: x, 
                            y: y - 100, 
                            scale: Math.random(), 
                            opacity: 0, 
                            duration: 1.5 + Math.random(), 
                            ease: "power2.out",
                            onComplete: () => dot.remove()
                        }
                    );
                }
            }

            // Countdown Logic
            let secondsLeft = 5;
            const timer = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `(${secondsLeft}s)`;
                if (secondsLeft <= 0) {
                    clearInterval(timer);
                    closeModal();
                }
            }, 1000);

            function closeModal() {
                gsap.to(modal, {
                    opacity: 0,
                    scale: 0.9,
                    y: 20,
                    duration: 0.5,
                    ease: "power2.in"
                });
            }

            document.getElementById('close-btn').addEventListener('click', () => {
                clearInterval(timer);
                closeModal();
            });
        });
    </script>
