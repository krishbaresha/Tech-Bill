<style>

<body class="bg-background text-on-background min-h-screen relative flex flex-col items-center justify-center p-6 overflow-hidden transition-colors duration-500">
<!-- Ambient Background Decorations -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-glow-top"></div>
<div class="absolute inset-0 bg-glow-bottom"></div>
</div>
<!-- Top Right Toggle -->

</button>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px] flex flex-col gap-8 opacity-0" id="login-card" style="translate: none; rotate: none; scale: none; transform: translate(0px, 0px); opacity: 1;">
<div class="glass-card rounded-xl p-8 md:p-10 flex flex-col gap-6">
<!-- Logo Row -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-xl flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">bolt</span>
</div>
<div class="flex flex-col">
<span class="font-headline-lg text-[22px] leading-tight font-bold tracking-tight text-on-surface">ElectroTrack</span>

</div>
</div>
<div class="w-full h-px bg-outline-variant opacity-30"></div>
<!-- Heading Section -->
<div class="flex flex-col gap-1">
<h1 class="font-headline-lg text-28px font-bold text-on-surface">Welcome back</h1>
<p class="font-body-md text-on-surface-variant">Sign in to continue to your store</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-4" onsubmit="return false">
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-on-surface-variant uppercase ml-1">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">mail</span>
<input class="w-full h-12 pl-11 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder:text-outline font-body-md transition-all" placeholder="owner@electrohub.pk" type="email">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-on-surface-variant uppercase ml-1">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">lock</span>
<input class="w-full h-12 pl-11 pr-11 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface placeholder:text-outline font-body-md transition-all" id="password-input" placeholder="••••••••" type="password">
<button class="absolute right-3 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-lowest text-primary focus:ring-primary-container transition-all" type="checkbox">
<span class="font-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-primary font-medium hover:underline" href="#">Forgot Password?</a>
</div>

<span class="">Sign In</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
<!-- Separator -->

<!-- Google Auth -->

</form>
<!-- Footer Security -->
<div class="flex items-center justify-center gap-2 pt-2">
<span class="material-symbols-outlined text-[14px] text-outline">lock</span>
<p class="font-body-sm text-[12px] text-outline">Protected by OTP verification • Rate limited</p>
</div>
</div>
<!-- Admin Access -->
<div class="flex justify-center">
<p class="font-body-sm text-on-surface-variant text-center">
                First time? <a class="text-primary font-medium hover:underline" href="#">Contact your admin</a> to get access.
            </p>
</div>
</main>
<!-- UI Interaction Script -->
<script>
        // Toggle Dark Mode
        const toggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        toggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Password Visibility
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // GSAP Animations
        window.addEventListener('DOMContentLoaded', () => {
            gsap.fromTo("#login-card", 
                { opacity: 0, y: 30 }, 
                { opacity: 1, y: 0, duration: 1, ease: "power4.out" }
            );

            // Button animations
            const buttons = document.querySelectorAll('.interactive-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mousedown', () => {
                    gsap.to(btn, { scale: 0.98, duration: 0.1 });
                });
                btn.addEventListener('mouseup', () => {
                    gsap.to(btn, { scale: 1, duration: 0.1 });
                });
                btn.addEventListener('mouseleave', () => {
                    gsap.to(btn, { scale: 1, duration: 0.1 });
                });
            });

            // Input interactions
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    gsap.to(input, { borderColor: '#c0c1ff', duration: 0.3 });
                });
                input.addEventListener('blur', () => {
                    gsap.to(input, { borderColor: 'rgba(144, 143, 160, 0.3)', duration: 0.3 });
                });
            });
        });

        // Set theme from local storage
        if (localStorage.getItem('theme') === 'light') {
            html.classList.remove('dark');
        }
    </script>


</body></html>
