<style>
        body {
            background-color: #0A0F1E;
            overflow: hidden;
        }
        .bg-glow-1 {
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        }
        .bg-glow-2 {
            background: radial-gradient(circle at center, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glow:focus {
            border-bottom-color: #c0c1ff;
            box-shadow: 0 4px 12px -2px rgba(192, 193, 255, 0.2);
        }
        .btn-primary-glow {
            box-shadow: 0 0 20px rgba(128, 131, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="font-body-md text-on-surface min-h-screen flex items-center justify-center relative">
<!-- Atmospheric Background Elements -->
<div class="absolute top-0 right-0 w-[800px] h-[800px] bg-glow-1 -translate-y-1/2 translate-x-1/4 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-glow-2 translate-y-1/4 -translate-x-1/4 pointer-events-none"></div>
<!-- Top Bar Actions -->
<div class="fixed top-gutter right-gutter z-50">
<button class="p-stack-sm rounded-full hover:bg-surface-variant/50 transition-colors flex items-center justify-center text-on-surface-variant hover:text-primary" onclick="toggleTheme()">
<span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
</button>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[480px] px-gutter flex flex-col items-center">
<!-- Login Card -->
<div class="glass-card w-full rounded-xl p-stack-lg flex flex-col gap-stack-lg opacity-0 translate-y-8" id="login-card">
<!-- Header Section -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-stack-md">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-primary leading-tight">ElectroTrack</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Universal POS</p>
</div>
</div>
</div>
<!-- Separator -->
<div class="h-px w-full bg-white/10"></div>
<!-- Title Section -->
<div class="flex flex-col gap-stack-xs">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to continue to your store</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col gap-stack-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-white/10 rounded-t-lg pt-3 pb-3 pl-10 pr-4 font-label-mono text-label-mono text-on-surface placeholder:text-outline focus:ring-0 input-glow transition-all" placeholder="owner@electrohub.pk" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Access Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
<input class="w-full bg-white/5 border-0 border-b-2 border-white/10 rounded-t-lg pt-3 pb-3 pl-10 pr-12 font-label-mono text-label-mono text-on-surface placeholder:text-outline focus:ring-0 input-glow transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Form Row -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-stack-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-4 h-4 rounded border border-white/20 bg-white/5 checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[12px] text-on-primary opacity-0 peer-checked:opacity-100 left-0.5 pointer-events-none">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-primary hover:underline underline-offset-4" href="#">Forgot Password?</a>
</div>
<!-- CTA -->
<button class="mt-stack-sm w-full bg-primary hover:bg-primary-container text-on-primary font-headline-md text-headline-md py-stack-md rounded-lg btn-primary-glow transition-all flex items-center justify-center gap-stack-sm" id="signin-btn" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Footer Text -->
<div class="flex items-center justify-center gap-stack-xs text-on-surface-variant/50">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="font-body-sm text-[12px] uppercase tracking-wider">Protected by OTP verification • Rate limited</p>
</div>
</div>
<!-- Outside Card Helper -->
<p class="mt-stack-lg font-body-sm text-body-sm text-on-surface-variant opacity-0" id="outside-text">
            First time? <a class="text-primary hover:underline font-medium" href="#">Contact your admin</a> to get access.
        </p>
</main>
<script>
        // GSAP Animations
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            
            tl.to("#login-card", {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: "power4.out"
            })
            .to("#outside-text", {
                opacity: 1,
                duration: 0.8,
                ease: "power2.out"
            }, "-=0.6");

            // Button interaction
            const btn = document.getElementById('signin-btn');
            btn.addEventListener('mousedown', () => {
                gsap.to(btn, { scale: 0.98, duration: 0.1 });
            });
            btn.addEventListener('mouseup', () => {
                gsap.to(btn, { scale: 1, duration: 0.2, ease: "elastic.out(1, 0.3)" });
            });
            btn.addEventListener('mouseleave', () => {
                gsap.to(btn, { scale: 1, duration: 0.2 });
            });
        });

        // Simple Theme Toggle (Visual only for demonstration)
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.style.backgroundColor = '#F8FAFC';
                icon.innerText = 'light_mode';
                // Adjust glass cards for light mode visibility
                gsap.to(".glass-card", { backgroundColor: "rgba(255, 255, 255, 0.8)", duration: 0.3 });
            } else {
                html.classList.add('dark');
                html.style.backgroundColor = '#0A0F1E';
                icon.innerText = 'dark_mode';
                gsap.to(".glass-card", { backgroundColor: "rgba(255, 255, 255, 0.05)", duration: 0.3 });
            }
        }

        // Particle background logic for high-end feel
        const createParticle = () => {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-primary/20 rounded-full pointer-events-none';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            document.body.appendChild(particle);

            gsap.to(particle, {
                y: '-=100',
                opacity: 0,
                duration: Math.random() * 3 + 2,
                ease: 'none',
                onComplete: () => {
                    particle.remove();
                    createParticle();
                }
            });
        }

        for(let i=0; i<15; i++) {
            setTimeout(createParticle, i * 300);
        }
    </script>
</body></html>
