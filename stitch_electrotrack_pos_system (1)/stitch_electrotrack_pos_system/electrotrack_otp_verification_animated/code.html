<script>
    document.addEventListener('DOMContentLoaded', () => {
        const otpCard = document.getElementById('otp-card');
        const otpInputs = document.querySelectorAll('.otp-field');
        const verifyBtn = document.getElementById('verify-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        // 1. Entrance Animation
        gsap.to(otpCard, {
            y: 0,
            opacity: 1,
            duration: 1,
            ease: "power4.out",
            startAt: { y: 30, opacity: 0 }
        });

        // 4. Digits Entrance Stagger
        gsap.from(otpInputs, {
            y: 20,
            opacity: 0,
            duration: 0.8,
            stagger: 0.08,
            ease: "back.out(1.7)",
            delay: 0.3
        });

        // 2. OTP Input Logic
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }

                if (e.target.value !== '') {
                    // GSAP Bounce effect on digit enter
                    gsap.fromTo(input, 
                        { scale: 0.9, backgroundColor: 'rgba(192, 193, 255, 0.2)' },
                        { scale: 1, backgroundColor: 'rgba(192, 193, 255, 0.05)', duration: 0.4, ease: "elastic.out(1, 0.3)" }
                    );

                    // Move to next input
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        otpInputs[index - 1].focus();
                        gsap.to(otpInputs[index - 1], { x: -2, duration: 0.1, yoyo: true, repeat: 1 });
                    }
                }
            });

            // Prevent scroll/spin
            input.addEventListener('wheel', (e) => e.preventDefault());
        });

        // 3. Timer Logic
        let totalSeconds = 4 * 60 + 32;
        const minEl = document.getElementById('min-display');
        const secEl = document.getElementById('sec-display');
        const timerContainer = document.getElementById('timer-container');

        const timerInterval = setInterval(() => {
            totalSeconds--;
            
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            minEl.textContent = String(minutes).padStart(2, '0');
            secEl.textContent = String(seconds).padStart(2, '0');

            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                timerContainer.innerHTML = `
                    <div class="w-full text-center py-2 animate-pulse">
                        <a href="#" class="text-primary font-bold hover:underline tracking-tight transition-all">Didn't receive a code? Resend OTP</a>
                    </div>
                `;
            }
        }, 1000);

        // 5. Mode Toggle
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            themeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
            
            gsap.fromTo(themeIcon, 
                { rotate: 0, scale: 0.5 }, 
                { rotate: 360, scale: 1, duration: 0.5, ease: "back.out(1.7)" }
            );
        });

        // 7. Verify Button press animation
        verifyBtn.addEventListener('mousedown', () => {
            gsap.to(verifyBtn, { scale: 0.95, duration: 0.1 });
        });
        
        verifyBtn.addEventListener('mouseup', () => {
            gsap.to(verifyBtn, { scale: 1, duration: 0.4, ease: "elastic.out(1, 0.3)" });
            
            // Simple validation feedback if empty
            const isComplete = Array.from(otpInputs).every(i => i.value !== '');
            if (!isComplete) {
                gsap.to("#otp-inputs-container", { x: 10, duration: 0.1, repeat: 3, yoyo: true, ease: "power1.inOut" });
            }
        });

        verifyBtn.addEventListener('mouseleave', () => {
            gsap.to(verifyBtn, { scale: 1, duration: 0.2 });
        });
    });
</script>
