name: Backend CI Build

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'techbill-api/**'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'techbill-api/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./techbill-api

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Backend and Capture Logs
      run: |
        # Run the build, capturing standard output and error to a dedicated file
        npm run build > build-logs.txt 2>&1 || { echo "Build Failed! See logs below:"; cat build-logs.txt; exit 1; }
      shell: bash

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-build-logs
        path: ./techbill-api/build-logs.txt
