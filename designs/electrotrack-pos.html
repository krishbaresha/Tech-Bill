  return (
    <div className={`rounded-2xl border bg-gradient-to-br p-4 ${bg[accent]}`} style={{background:'rgba(30,36,56,0.9)'}}>
      <div className="flex items-start justify-between mb-2">

  );

function BarChart({data,labels}) {
  const mx = Math.max(...data);
  return (
    <div className="flex items-end gap-1 h-full w-full">
      {data.map((v,i)=>(
        <div key={i} className="flex-1 flex flex-col items-center gap-1 h-full justify-end">
          <div className="w-full rounded-t transition-all" style={{height:`${(v/mx)*100}%`,background:i===data.length-1?'#6366F1':'rgba(99,102,241,0.28)',minHeight:2}}/>
          <span className="text-[8px] text-slate-600">{labels[i]}</span>
        </div>
      ))}
    </div>
  );
}

/* ── POS ── */
function POS() {
  const [search,setSearch] = useState('');
  const [cart,setCart]     = useState([]);
  const [payOpen,setPayOpen] = useState(false);
  const [method,setMethod] = useState('cash');
  const [disc,setDisc]     = useState(0);
  const [phone,setPhone]   = useState('');
  const [done,setDone]     = useState(false);

  const filtered = PRODUCTS.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    p.brand.toLowerCase().includes(search.toLowerCase())||
    p.cat.toLowerCase().includes(search.toLowerCase())
  );

  const addItem = p => {
    if(p.stock===0){toast('Out of stock!','error');return;}
    setCart(c=>[...c,{...p,serial:genSN(p.brand),cid:Math.random().toString(36).slice(2)}]);
    toast(`${p.name} added to cart`,'success');
  };
  const rm = cid => setCart(c=>c.filter(i=>i.cid!==cid));
  const subtotal = cart.reduce((s,i)=>s+i.sell,0);
  const discAmt  = Math.round(subtotal*disc/100);
  const total    = subtotal-discAmt;

  const pay = () => { if(!cart.length){toast('Cart is empty','error');return;} setPayOpen(true); };
  const confirm = () => {
    setPayOpen(false); setDone(true);
    toast(`₨ ${total.toLocaleString()} received via ${method.replace('_',' ')}`,'success');
    setTimeout(()=>{setDone(false);setCart([]);setDisc(0);setPhone('');},2800);
  };

  return (
    <div className="flex h-full overflow-hidden">
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="p-3 border-b border-white/6">
          <div className="relative">
            <I n="srch" s={14} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-600"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, brand, or category…"
              className="w-full bg-elevated border border-white/10 rounded-xl pl-9 pr-3 py-2.5 text-sm text-slate-300 placeholder-slate-600 focus:outline-none focus:border-brand/50 focus:ring-1 focus:ring-brand/20"/>
          </div>
        </div>
        <div className="flex-1 overflow-auto p-3">
          <div className="grid grid-cols-3 xl:grid-cols-4 gap-2.5">
            {filtered.map(p=>(
              <button key={p.id} onClick={()=>addItem(p)} disabled={p.stock===0}
                className={`text-left p-3 rounded-xl border transition-all ${p.stock===0?'opacity-35 cursor-not-allowed border-white/4':'border-white/8 hover:border-brand/40 hover:bg-brand/5 active:scale-95'} bg-card`}>
                <div className="w-8 h-8 rounded-lg bg-brand/12 flex items-center justify-center text-brand mb-2"><I n="pkg" s={14}/></div>
                <p className="text-xs font-semibold text-slate-200 leading-tight mb-0.5 truncate">{p.name}</p>
                <p className="text-[10px] text-slate-600 mb-2">{p.brand} · {p.cat}</p>
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold text-brand font-mono">{fmtK(p.sell)}</span>
                  <span className={`text-[9px] px-1.5 py-0.5 rounded-full font-medium ${p.stock<=2?'bg-danger/15 text-danger':p.stock<=5?'bg-warning/15 text-warning':'bg-success/15 text-success'}`}>{p.stock}</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="bg-surface border-l border-white/6 flex flex-col" style={{width:272}}>
        <div className="p-3 border-b border-white/6">
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-sm font-semibold font-display text-slate-200">Cart</h2>
            {cart.length>0&&<button onClick={()=>setCart([])} className="text-[10px] text-slate-600 hover:text-danger transition-colors">Clear</button>}
          </div>
          <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Customer phone (optional)"
            className="w-full bg-elevated border border-white/10 rounded-xl px-3 py-2 text-xs text-slate-400 placeholder-slate-600 focus:outline-none focus:border-brand/50"/>
        </div>
        <div className="flex-1 overflow-auto p-2">
          {!cart.length
            ? <div className="flex flex-col items-center justify-center h-28 text-slate-700"><I n="pos" s={22} c="mb-2 opacity-40"/><p className="text-xs">Cart empty</p></div>
            : <div className="space-y-1.5">
                {cart.map(i=>(
                  <div key={i.cid} className="flex items-start gap-2 p-2.5 bg-card rounded-xl border border-white/6">
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-medium text-slate-300 truncate">{i.name}</p>
                      <p className="text-[10px] text-cyan font-mono">{i.serial}</p>
                      <p className="text-xs font-bold text-brand font-mono mt-0.5">{fmt(i.sell)}</p>
                    </div>
                    <button onClick={()=>rm(i.cid)} className="p-1 rounded-lg hover:bg-danger/15 text-slate-600 hover:text-danger transition-colors shrink-0"><I n="trash" s={11}/></button>
                  </div>
                ))}
              </div>
          }
        </div>
        <div className="p-3 border-t border-white/6 space-y-2.5">
          <div className="flex items-center gap-2">
            <span className="text-[11px] text-slate-600 whitespace-nowrap">Discount %</span>
            <input type="number" min="0" max="100" value={disc} onChange={e=>setDisc(Number(e.target.value))}
              className="flex-1 bg-elevated border border-white/10 rounded-lg px-2 py-1.5 text-xs text-slate-300 text-center focus:outline-none focus:border-brand/50"/>
          </div>
          <div className="space-y-1 text-xs">
            <div className="flex justify-between text-slate-500"><span>Subtotal</span><span className="font-mono">{fmt(subtotal)}</span></div>
            {disc>0&&<div className="flex justify-between text-success"><span>Discount ({disc}%)</span><span className="font-mono">-{fmt(discAmt)}</span></div>}
            <div className="flex justify-between text-slate-200 font-bold text-sm pt-1.5 border-t border-white/6"><span>Total</span><span className="font-mono">{fmt(total)}</span></div>
          </div>
          <button onClick={pay} className={`w-full py-3 rounded-xl text-white text-sm font-semibold transition-all ${done?'bg-success':'brand-grad glow-brand hover:opacity-90'}`}>
            {done?'✓ Sale Complete!':'Process Payment'}
          </button>
        </div>
      </div>

      {payOpen&&(
        <Modal title="Select Payment Method" onClose={()=>setPayOpen(false)}>
          <div className="space-y-4">
            <div className="p-4 bg-elevated rounded-xl text-center border border-white/6">
              <p className="text-[11px] text-slate-600 mb-1">Total Amount</p>
              <p className="text-3xl font-bold font-mono text-brand">{fmt(total)}</p>
              <p className="text-[11px] text-slate-600 mt-1">{cart.length} item{cart.length!==1?'s':''}</p>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {['cash','card','easypaisa','jazzcash','bank_transfer','store_credit'].map(m=>(
                <button key={m} onClick={()=>setMethod(m)}
                  className={`py-2.5 rounded-xl text-xs font-medium capitalize transition-all ${method===m?'bg-brand text-white':'bg-elevated text-slate-400 hover:bg-white/8 border border-white/8'}`}>
                  {m.replace('_',' ')}
                </button>
              ))}
            </div>
            <Btn cl="w-full justify-center py-2.5" onClick={confirm}>Confirm {method.replace('_',' ')} — {fmt(total)}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

            {['Product','Units Sold','Revenue','Margin'].map((h,i)=><th key={h} className={`px-4 py-2.5 font-medium text-slate-600 ${i===0?'text-left':'text-right'}`}>{h}</th>)}
          </tr></thead>
          <tbody>
            {[...PRODUCTS].sort((a,b)=>b.sell-a.sell).map((p,i)=>{
              const u=Math.floor(Math.random()*50+10);
              return (
                <tr key={p.id} className="border-b border-white/4 hover:bg-white/2">
                  <td className="px-4 py-2.5 text-slate-300">{i+1}. {p.name}</td>
                  <td className="px-4 py-2.5 text-right text-slate-500">{u}</td>
                  <td className="px-4 py-2.5 text-right font-mono text-brand">{fmtK(p.sell*u)}</td>
                  <td className="px-4 py-2.5 text-right text-success">{mgn(p.sell,p.cost)}%</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── CUSTOMERS ── */
function Customers() {
  const [search,setSearch]   = useState('');
  const [expanded,setExpanded] = useState(null);
  const filtered = CUSTOMERS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.phone.includes(search));
  return (
    <div className="flex-1 overflow-auto p-5">
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-lg font-bold font-display text-slate-100">Customers</h1>
        <div className="relative">
          <I n="srch" s={13} c="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-600"/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or phone…"
            className="bg-elevated border border-white/10 rounded-xl pl-8 pr-3 py-2 text-xs text-slate-300 placeholder-slate-600 focus:outline-none focus:border-brand/50 w-52"/>
        </div>
      </div>
      <div className="bg-card border border-white/6 rounded-2xl overflow-hidden">
        <table className="w-full text-xs">
          <thead><tr className="border-b border-white/6">
            <th className="px-4 py-3 font-medium text-slate-600 text-left">Customer</th>
            <th className="px-4 py-3 font-medium text-slate-600 text-left">Phone</th>
            <th className="px-4 py-3 font-medium text-slate-600 text-right">Purchases</th>
            <th className="px-4 py-3 font-medium text-slate-600 text-right">Total Spent</th>
            <th className="px-4 py-3"/>
          </tr></thead>
          <tbody>
            {filtered.map(c=>(
              <React.Fragment key={c.id}>
                <tr className="border-b border-white/4 hover:bg-white/2 cursor-pointer transition-colors" onClick={()=>setExpanded(expanded===c.id?null:c.id)}>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2.5">
                      <div className="w-8 h-8 rounded-full bg-brand/15 flex items-center justify-center text-brand font-semibold shrink-0">{c.name[0]}</div>
                      <div><p className="font-medium text-slate-200">{c.name}</p><p className="text-[10px] text-slate-600">{c.email||'No email'}</p></div>
                    </div>
                  </td>
                  <td className="px-4 py-3 font-mono text-slate-500">{c.phone}</td>
                  <td className="px-4 py-3 text-right text-slate-400">{c.purchases}</td>
                  <td className="px-4 py-3 text-right font-mono text-brand font-medium">{fmtK(c.spent)}</td>
                  <td className="px-4 py-3 text-right text-slate-600"><I n={expanded===c.id?'up':'dn'} s={13}/></td>
                </tr>
                {expanded===c.id&&(
                  <tr className="bg-elevated/40">
                    <td colSpan={5} className="px-4 py-3">
                      <p className="text-[11px] font-medium text-slate-500 mb-2">Purchase History</p>
                      <div className="space-y-1.5">
                        {SALES.slice(0,3).map(s=>(
                          <div key={s.id} className="flex items-center gap-3 p-2.5 bg-card rounded-xl border border-white/6">
                            <span className="font-mono text-[10px] text-slate-600 shrink-0">{s.inv}</span>
                            <span className="text-xs text-slate-400 flex-1 truncate">{s.product}</span>
                            <span className="text-xs font-mono text-brand shrink-0">{fmt(s.amount)}</span>
                            <Pill s={s.status}/>
                          </div>
                        ))}
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── RETURNS ── */
function Returns() {
  const [modal,setModal]   = useState(false);
  const [returns,setRets]  = useState(RETURNS_DATA);
  const [form,setForm]     = useState({inv:'',reason:'',method:'cash'});
  const submit = () => {
    if(!form.inv||!form.reason){toast('Fill all fields','error');return;}
    setRets(p=>[{id:'r'+Date.now(),inv:form.inv,product:'Product (pending lookup)',reason:form.reason,status:'pending',refund:0,date:new Date().toISOString().slice(0,10)},...p]);
    toast('Return submitted','success');
    setModal(false); setForm({inv:'',reason:'',method:'cash'});
  };
  const approve = id => {setRets(p=>p.map(r=>r.id===id?{...r,status:'approved',refund:50000}:r));toast('Return approved','success');};
  const reject  = id => {setRets(p=>p.map(r=>r.id===id?{...r,status:'rejected'}:r));toast('Return rejected','info');};
  return (
    <div className="flex-1 overflow-auto p-5">
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-lg font-bold font-display text-slate-100">Returns</h1>
        <Btn onClick={()=>setModal(true)}><I n="plus" s={14}/>New Return</Btn>
      </div>
      <div className="space-y-2.5">
        {returns.map(r=>(
          <div key={r.id} className="bg-card border border-white/6 rounded-xl p-4 flex items-center gap-3">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${r.status==='approved'?'bg-success/12 text-success':r.status==='rejected'?'bg-danger/12 text-danger':'bg-warning/12 text-warning'}`}><I n="ret" s={16}/></div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-0.5"><p className="text-sm font-medium text-slate-200">{r.product}</p><Pill s={r.status}/></div>
              <p className="text-[11px] text-slate-600">{r.inv} · {r.reason} · {r.date}</p>
            </div>
            <div className="text-right shrink-0">
              {r.refund>0&&<p className="text-sm font-bold font-mono text-success mb-1">{fmt(r.refund)}</p>}
              {r.status==='pending'&&(
                <div className="flex gap-1.5">
                  <button onClick={()=>approve(r.id)} className="px-2.5 py-1 bg-success/12 text-success text-xs rounded-lg hover:bg-success/20 transition-colors font-medium">Approve</button>
                  <button onClick={()=>reject(r.id)}  className="px-2.5 py-1 bg-danger/12  text-danger  text-xs rounded-lg hover:bg-danger/20  transition-colors font-medium">Reject</button>
                </div>
              )}
              {r.status!=='pending'&&r.refund===0&&<p className="text-[11px] text-slate-600">No refund</p>}
            </div>
          </div>
        ))}
      </div>
      {modal&&(
        <Modal title="New Return Request" onClose={()=>setModal(false)}>
          <div className="space-y-3">
            <Fld label="Invoice Number" value={form.inv} onChange={e=>setForm(f=>({...f,inv:e.target.value}))} placeholder="INV-20260527-XXXXXX"/>
            <Fld label="Reason" value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} placeholder="Describe the issue…"/>
            <Slct label="Refund Method" value={form.method} onChange={e=>setForm(f=>({...f,method:e.target.value}))}>
              <option value="cash">Cash</option>
              <option value="bank_transfer">Bank Transfer</option>
              <option value="store_credit">Store Credit</option>
            </Slct>
            <Btn cl="w-full justify-center mt-1" onClick={submit}>Submit Return Request</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── SETTINGS ── */
function Settings() {
  const [tab,setTab]       = useState('shop');
  const [shopName,setShop] = useState('ElectroTrack — Gulberg, Lahore');
  const [maxDisc,setMaxD]  = useState('500');
  const [lowSt,setLowSt]   = useState('5');
  const [taxRate,setTax]   = useState('17');
  const [notifs,setN]      = useState({lowStock:true,largeSale:true,returns:false,daily:true});
  const save = () => toast('Settings saved!','success');
  const TABS = [['shop','Shop Info'],['pos','POS Rules'],['users','Users'],['notifications','Notifications']];
  return (
    <div className="flex-1 overflow-auto p-5">
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-lg font-bold font-display text-slate-100">Settings</h1>
        <Btn onClick={save}><I n="chk" s={14}/>Save Changes</Btn>
      </div>
      <div className="flex gap-5">
        <div className="w-36 shrink-0 space-y-0.5">
          {TABS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`w-full text-left px-3 py-2 rounded-xl text-sm transition-all ${tab===id?'bg-brand/12 text-brand border border-brand/20':'text-slate-500 hover:bg-white/5 hover:text-slate-300'}`}>{lbl}</button>
          ))}
        </div>
        <div className="flex-1 bg-card border border-white/6 rounded-2xl p-5">
          {tab==='shop'&&(
            <div className="space-y-4">
              <h3 className="text-sm font-semibold font-display text-slate-200 mb-1">Shop Information</h3>
              <Fld label="Shop Name" value={shopName} onChange={e=>setShop(e.target.value)}/>
              <div className="grid grid-cols-2 gap-3">
                <Fld label="Tax Rate (%)" type="number" value={taxRate} onChange={e=>setTax(e.target.value)}/>
                <Fld label="Currency" defaultValue="PKR (₨)" readOnly/>
              </div>
              <Fld label="Business Registration" placeholder="e.g. REG-12345-LHR"/>
              <Fld label="Address" placeholder="Shop street address, city"/>
            </div>
          )}
          {tab==='pos'&&(
            <div className="space-y-4">
              <h3 className="text-sm font-semibold font-display text-slate-200 mb-1">POS Rules</h3>
              <Fld label="Max Discount Without OTP (₨)" type="number" value={maxDisc} onChange={e=>setMaxD(e.target.value)}/>
              <Fld label="Low Stock Alert Threshold (units)" type="number" value={lowSt} onChange={e=>setLowSt(e.target.value)}/>
              {[['otpReq','Require OTP for large discounts','Cashier must verify with OTP',true],
                ['print','Print receipt automatically','Print on sale completion',false],
                ['void','Allow cashier to void own sales','Without manager approval',false],
              ].map(([k,lbl,desc,on])=>(
                <div key={k} className="flex items-center justify-between p-3 bg-elevated rounded-xl border border-white/6">
                  <div><p className="text-sm text-slate-300">{lbl}</p><p className="text-xs text-slate-600 mt-0.5">{desc}</p></div>
                  <Toggle on={on} onToggle={()=>toast('Updated','info')}/>
                </div>
              ))}
            </div>
          )}
          {tab==='users'&&(
            <div className="space-y-3">
              <div className="flex items-center justify-between mb-1">
                <h3 className="text-sm font-semibold font-display text-slate-200">Team Members</h3>
                <Btn sz="sm" onClick={()=>toast('Invite link copied!','info')}><I n="plus" s={12}/>Invite</Btn>
              </div>
              {[{name:'Owner',role:'owner',email:'owner@electrotrack.pk',active:true},
                {name:'Bilal Ahmed',role:'cashier',email:'bilal@electrotrack.pk',active:true},
                {name:'Sara Khan',role:'cashier',email:'sara@electrotrack.pk',active:true},
                {name:'Tariq Hussain',role:'inventory_manager',email:'tariq@electrotrack.pk',active:false},
                {name:'Aisha Noor',role:'accountant',email:'aisha@electrotrack.pk',active:true},
              ].map(u=>(
                <div key={u.email} className="flex items-center gap-3 p-3 bg-elevated rounded-xl border border-white/6">
                  <div className="w-9 h-9 rounded-full bg-brand/15 flex items-center justify-center text-brand font-semibold shrink-0">{u.name[0]}</div>
                  <div className="flex-1 min-w-0"><p className="text-sm font-medium text-slate-200">{u.name}</p><p className="text-xs text-slate-600">{u.email}</p></div>
                  <Pill s={u.role}/><Pill s={u.active?'active':'inactive'}/>
                </div>
              ))}
            </div>
          )}
          {tab==='notifications'&&(
            <div className="space-y-3">
              <h3 className="text-sm font-semibold font-display text-slate-200 mb-1">Notification Preferences</h3>
              {[{k:'lowStock',lbl:'Low stock alerts',desc:`Alert when stock drops below ${lowSt} units`},
                {k:'largeSale',lbl:'Large sale alerts',desc:'Notify for sales above ₨ 200,000'},
                {k:'returns',lbl:'Return requests',desc:'Notify when a return is submitted'},
                {k:'daily',lbl:'Daily sales summary',desc:'End-of-day report via notification'},
              ].map(({k,lbl,desc})=>(
                <div key={k} className="flex items-center justify-between p-3 bg-elevated rounded-xl border border-white/6">
                  <div><p className="text-sm text-slate-300">{lbl}</p><p className="text-xs text-slate-600 mt-0.5">{desc}</p></div>
                  <Toggle on={notifs[k]} onToggle={()=>setN(n=>({...n,[k]:!n[k]}))}/>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
const ROLE_PAGES = {
  owner:['dashboard','pos','inventory','reports','customers','returns','settings'],
  cashier:['pos','customers','returns'],
  inventory_manager:['pos','inventory'],
  accountant:['dashboard','reports','customers'],
};

function App() {
  const [page,setPage] = useState('dashboard');
  const [role,setRole] = useState('owner');

  useEffect(()=>{
    const valid = ROLE_PAGES[role]||['pos'];
    if(!valid.includes(page)) setPage(valid[0]);
  },[role]);

  const effectivePage = (ROLE_PAGES[role]||['pos']).includes(page)?page:(ROLE_PAGES[role]||['pos'])[0];
  const PAGES = {dashboard:<Dashboard/>,pos:<POS/>,inventory:<Inventory/>,reports:<Reports/>,customers:<Customers/>,returns:<Returns/>,settings:<Settings/>};

  return (
    <div className="flex h-screen overflow-hidden bg-base font-sans text-slate-200">
      <Sidebar page={effectivePage} setPage={setPage} role={role}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        <header className="h-11 border-b border-white/6 bg-surface flex items-center justify-between px-4 shrink-0">
          <span className="text-xs text-slate-500 font-medium capitalize">{effectivePage}</span>
          <div className="flex items-center gap-2.5">
            <select value={role} onChange={e=>setRole(e.target.value)}
              className="bg-elevated border border-white/10 rounded-lg px-2 py-1 text-xs text-slate-400 focus:outline-none focus:border-brand/50 cursor-pointer">
              <option value="owner">Owner</option>
              <option value="cashier">Cashier</option>
              <option value="inventory_manager">Inventory Manager</option>
              <option value="accountant">Accountant</option>
            </select>
            <button onClick={()=>toast('3 unread notifications','info')} className="p-1.5 rounded-lg text-slate-600 hover:bg-white/6 hover:text-slate-300 transition-colors relative">
              <I n="bell" s={14}/>
              <span className="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 bg-danger text-[8px] text-white flex items-center justify-center rounded-full font-bold">3</span>
            </button>
          </div>
        </header>
        <div className="flex-1 overflow-hidden flex">{PAGES[effectivePage]}</div>
      </div>

      <button
        onClick={()=>toast('AI: Top pick — restock iPhone 15 Pro before weekend rush','info')}
        className="fixed bottom-5 right-5 w-11 h-11 rounded-2xl brand-grad flex items-center justify-center text-white shadow-xl glow-brand hover:scale-105 active:scale-95 transition-transform z-30"
        title="AI Assistant">
        <I n="ai" s={18}/>
      </button>
      <Toasts/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
